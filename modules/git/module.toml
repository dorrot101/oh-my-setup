[module]
name = "git"
description = "Git 설정 및 글로벌 gitconfig 관리"
version = "1.0.0"
category = "dev-tools"

[dependencies]
modules = []
brews = ["git", "git-delta", "gh"]
casks = []

[dotfiles]
links = [
  { src = "dotfiles/.gitconfig.tpl", target = "~/.gitconfig", template = true },
]

[template_vars]
git_user_name = ""
git_user_email = ""
git_default_branch = "main"

[hooks]
pre_install = ""
post_install = ""
